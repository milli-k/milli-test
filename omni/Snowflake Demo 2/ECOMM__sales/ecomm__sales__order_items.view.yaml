# Reference this view as ecomm__sales__order_items
# View is defined in the semantic view SALES in the data warehouse
schema: ECOMM
folder: ECOMM/sales
table_name: ORDER_ITEMS

dimensions:
  id:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"ID"'
    format: ID
    primary_key: true

  order_id:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"ORDER_ID"'
    format: ID

  user_id:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"USER_ID"'
    format: ID

  inventory_item_id:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"INVENTORY_ITEM_ID"'
    format: ID

  sale_price:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"SALE_PRICE"'
    description: The price at which the item was sold, represeenting the amount the
      customer paid for the item.
    synonyms:
      [
        amount,
        cost,
        list_price,
        price_paid,
        purchase_price,
        selling_cost,
        selling_price,
        transaction_amount,
        unit_price
      ]

  status:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"STATUS"'
    description: The current status of the order item, such as "Shipped", "Pending",
      "Cancelled", or "Delivered", indicating the progress of the item through
      the order fulfillment process.
    synonyms:
      [
        category,
        classification,
        condition,
        designation,
        label,
        position,
        situation,
        standing,
        state,
        tag
      ]

  created_at:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"CREATED_AT"'
    description: The date and time when the order item was created.
    synonyms:
      [
        created_on,
        creation_date,
        creation_time,
        date_created,
        entry_date,
        initiation_date,
        inserted_at,
        start_date,
        timestamp
      ]

  returned_at:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"RETURNED_AT"'

  shipped_at:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"SHIPPED_AT"'

  delivered_at:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"DELIVERED_AT"'

  is_returned:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"IS_RETURNED"'

  is_delivered:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"IS_DELIVERED"'

  is_shipped:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"IS_SHIPPED"'

  margin:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"MARGIN"'
    description: The difference between the selling price and the cost of an item,
      representing the profit made on the sale of each item.
    synonyms: [ earnings, gain, gross_profit, markup, net_profit, profit, surplus ]

  months_since_signup:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"MONTHS_SINCE_SIGNUP"'
    description: The number of months that have elapsed since the customer signed up
      for the service.
    synonyms:
      [
        months_as_customer,
        months_since_account_creation,
        months_since_registration,
        subscription_length_in_months,
        tenure_in_months
      ]

  time_to_ship:
    # Dimension is defined in the semantic view SALES in the data warehouse
    sql: '"TIME_TO_SHIP"'
    description: The time it takes to ship the order item, measured in days.
    synonyms:
      [
        delivery_lead_time,
        lead_time_to_ship,
        shipment_duration,
        shipping_duration,
        shipping_time,
        time_to_delivery,
        time_to_dispatch
      ]

measures:
  count:
    aggregate_type: count

  average_sale_price:
    # Measure is defined in the semantic view SALES in the data warehouse
    sql: AVG("SALE_PRICE")

  max_sales:
    # Measure is defined in the semantic view SALES in the data warehouse
    sql: MAX("SALE_PRICE")
    description: The maximum number of sales for an order item.
    synonyms:
      [
        highest_revenue,
        highest_sales,
        max_revenue,
        maximum_revenue,
        peak_sales,
        sales_ceiling,
        sales_maximum,
        top_sales
      ]

  total_revenue:
    # Measure is defined in the semantic view SALES in the data warehouse
    sql: SUM("SALE_PRICE")
    description: The total revenue generated by each order item, representing the
      product of the item's unit price and quantity sold.
    synonyms:
      [
        gross_revenue,
        overall_revenue,
        total_income,
        total_sales,
        total_turnover
      ]
