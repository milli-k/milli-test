# Reference this view as ecomm__users
schema: ECOMM
table_name: USERS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  first_name:
    sql: '"FIRST_NAME"'

  last_name:
    sql: '"LAST_NAME"'

  email:
    sql: '"EMAIL"'

  age:
    sql: '"AGE"'

  city:
    sql: '"CITY"'

  state:
    sql: '"STATE"'

  country:
    sql: '"COUNTRY"'

  zip:
    sql: '"ZIP"'

  latitude:
    sql: '"LATITUDE"'

  longitude:
    sql: '"LONGITUDE"'

  gender:
    sql: '"GENDER"'

  created_at:
    sql: '"CREATED_AT"'

  traffic_source:
    sql: '"TRAFFIC_SOURCE"'

measures:
  count:
    aggregate_type: count
